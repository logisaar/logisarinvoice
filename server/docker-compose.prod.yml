version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: paylink-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - paylink_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paylink-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paylink-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - PAYTM_MID=${PAYTM_MID}
      - PAYTM_MERCHANT_KEY=${PAYTM_MERCHANT_KEY}
      - PAYTM_WEBSITE=${PAYTM_WEBSITE}
      - PAYTM_INDUSTRY_TYPE=${PAYTM_INDUSTRY_TYPE}
      - PAYTM_CHANNEL_ID=${PAYTM_CHANNEL_ID}
      - PAYTM_ENV=${PAYTM_ENV}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - paylink-network

volumes:
  paylink_mysql_data:
    name: paylink_mysql_data

networks:
  paylink-network:
    name: paylink-network
    driver: bridge
